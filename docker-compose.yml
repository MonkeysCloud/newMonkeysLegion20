version: '3.8'

services:
  # ===========================================================================
  # MySQL 8.0 Database
  # ===========================================================================
  mysql:
    image: mysql:8.0
    container_name: ml-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
    expose:
      - "3306"
    volumes:
      - mysql-data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${MYSQL_ROOT_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - ml-network

  # ===========================================================================
  # Drupal 11 (PHP 8.3-FPM)
  # ===========================================================================
  drupal:
    build:
      context: .
      dockerfile: docker/drupal/Dockerfile
    container_name: ml-drupal
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      DRUPAL_DB_HOST: ${DRUPAL_DB_HOST}
      DRUPAL_DB_PORT: ${DRUPAL_DB_PORT}
      DRUPAL_DB_NAME: ${DRUPAL_DB_NAME}
      DRUPAL_DB_USER: ${DRUPAL_DB_USER}
      DRUPAL_DB_PASSWORD: ${DRUPAL_DB_PASSWORD}
      DRUPAL_HASH_SALT: ${DRUPAL_HASH_SALT}
    volumes:
      - ./drupal:/var/www/html
      - drupal-files:/var/www/html/web/sites/default/files
    networks:
      - ml-network

  # ===========================================================================
  # Nginx Reverse Proxy
  # ===========================================================================
  nginx:
    image: nginx:alpine
    container_name: ml-nginx
    restart: unless-stopped
    depends_on:
      - drupal
      - nextjs
    ports:
      - "80:80"
    volumes:
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - ./drupal/web:/var/www/html/web:ro
      - drupal-files:/var/www/html/web/sites/default/files:ro
    networks:
      - ml-network

  # ===========================================================================
  # Next.js 15 Frontend
  # ===========================================================================
  nextjs:
    build:
      context: .
      dockerfile: docker/nextjs/Dockerfile
    container_name: ml-nextjs
    restart: unless-stopped
    environment:
      NEXT_PUBLIC_DRUPAL_BASE_URL: ${NEXT_PUBLIC_DRUPAL_BASE_URL}
      NEXT_PUBLIC_GA_MEASUREMENT_ID: ${NEXT_PUBLIC_GA_MEASUREMENT_ID}
      DRUPAL_CLIENT_ID: ${DRUPAL_CLIENT_ID}
      DRUPAL_CLIENT_SECRET: ${DRUPAL_CLIENT_SECRET}
      DRUPAL_PREVIEW_SECRET: ${DRUPAL_PREVIEW_SECRET}
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app
      - /app/node_modules
      - /app/.next
    networks:
      - ml-network

volumes:
  mysql-data:
    driver: local
  drupal-files:
    driver: local

networks:
  ml-network:
    driver: bridge
