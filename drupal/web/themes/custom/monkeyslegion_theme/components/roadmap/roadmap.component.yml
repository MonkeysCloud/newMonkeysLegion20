$schema: https://git.drupalcode.org/project/drupal/-/raw/HEAD/core/assets/schemas/v1/metadata.schema.json
name: Roadmap
description: Three-column roadmap timeline showing shipped, coming, and vision features.
status: experimental
props:
  type: object
  properties:
    title:
      type: string
      title: Title Prefix
      default: "Where we're"
    title_gradient:
      type: string
      title: Gradient Title Text
      default: 'going.'
slots:
  shipped:
    title: Shipped in v2.0
  coming:
    title: Coming in v2.1
  vision:
    title: v3.0 Vision
