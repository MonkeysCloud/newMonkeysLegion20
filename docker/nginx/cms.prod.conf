# CMS Nginx config — serves Drupal PHP-FPM on port 8080
server {
    listen 8080;
    server_name _;

    root /var/www/html/web;
    index index.php index.html;

    client_max_body_size 128M;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # PHP processing
    location ~ \.php$ {
        fastcgi_split_path_info ^(.+?\.php)(|/.*)$;
        include fastcgi_params;
        fastcgi_param HTTP_PROXY "";
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        fastcgi_param PATH_INFO $fastcgi_path_info;
        fastcgi_param QUERY_STRING $query_string;
        fastcgi_intercept_errors on;
        fastcgi_pass 127.0.0.1:9000;
        fastcgi_read_timeout 300;
    }

    # Drupal clean URLs
    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    # Static assets
    location ~* \.(css|js|gif|jpe?g|png|svg|ico|webp|woff2?|ttf|eot)$ {
        expires 30d;
        access_log off;
        try_files $uri $uri/ /index.php?$query_string;
    }

    # Block sensitive files
    location ~ /\.ht { deny all; }
    location ~ /\.git { deny all; }
    location ~ (^|/)\.(?!well-known) { deny all; }
    location ~* \.(txt|log|engine|inc|info|install|make|module|profile|test|po|sh|sql|theme|twig|tpl(\.php)?|xtmpl|yml|yaml)(~|\.sw[op]|\.bak|\.orig|\.save)?$|/(\.(?!well-known).*|Entries.*|Repository|Root|Tag|composer\.(json|lock)|web\.config)$|/#hierarchical_select/ {
        deny all;
    }

    # Health check endpoint for Cloud Run
    location = /healthz {
        access_log off;
        return 200 'ok';
        add_header Content-Type text/plain;
    }
}
