# =============================================================================
# Nginx Configuration — MonkeysLegion v2.0 Info Site
# Routes: cms.localhost → Drupal (full backend)
#         localhost      → Next.js frontend (with /jsonapi proxy to Drupal)
# =============================================================================

upstream php-fpm {
    server drupal:9000;
}

upstream nextjs {
    server nextjs:3000;
}

# =============================================================================
# Drupal CMS — cms.localhost
# =============================================================================
server {
    listen 80;
    server_name cms.localhost;

    root /var/www/html/web;
    index index.php index.html;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Drupal file uploads
    client_max_body_size 128M;

    # PHP processing
    location ~ \.php$ {
        fastcgi_split_path_info ^(.+?\.php)(|/.*)$;
        include fastcgi_params;
        fastcgi_param HTTP_PROXY "";
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        fastcgi_param PATH_INFO $fastcgi_path_info;
        fastcgi_param QUERY_STRING $query_string;
        fastcgi_intercept_errors on;
        fastcgi_pass php-fpm;
        fastcgi_read_timeout 300;
    }

    # Drupal clean URLs — route everything to index.php
    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    # Static assets from Drupal (fallback to index.php for dynamically generated aggregated CSS/JS)
    location ~* \.(css|js|gif|jpe?g|png|svg|ico|webp|woff2?|ttf|eot)$ {
        expires 30d;
        access_log off;
        try_files $uri $uri/ /index.php?$query_string;
    }

    # Block hidden/sensitive files
    location ~ /\.ht { deny all; }
    location ~ /\.git { deny all; }
    location ~ (^|/)\.(?!well-known) { deny all; }

    # Block access to sensitive Drupal files
    # Block access to sensitive Drupal files (note: "Template" removed from
    # path-segment list — it was matching clean URLs like /docs/package/template)
    location ~* \.(txt|log|engine|inc|info|install|make|module|profile|test|po|sh|sql|theme|twig|tpl(\.php)?|xtmpl|yml|yaml)(~|\.sw[op]|\.bak|\.orig|\.save)?$|/(\.(?!well-known).*|Entries.*|Repository|Root|Tag|composer\.(json|lock)|web\.config)$|/#hierarchical_select/ {
        deny all;
    }
}

# =============================================================================
# Next.js Frontend — localhost (default)
# =============================================================================
server {
    listen 80 default_server;
    server_name localhost;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # JSON:API proxy — so Next.js SSR can reach Drupal via the same host
    location /jsonapi {
        rewrite ^/jsonapi(.*)$ /jsonapi$1 break;
        fastcgi_pass php-fpm;
        fastcgi_param SCRIPT_FILENAME /var/www/html/web/index.php;
        fastcgi_param QUERY_STRING $query_string;
        fastcgi_param PATH_INFO $fastcgi_path_info;
        fastcgi_param HTTP_PROXY "";
        include fastcgi_params;
        fastcgi_read_timeout 300;
    }

    # Drupal OAuth endpoints (needed for Next.js auth)
    location /oauth {
        fastcgi_pass php-fpm;
        fastcgi_param SCRIPT_FILENAME /var/www/html/web/index.php;
        fastcgi_param QUERY_STRING $query_string;
        fastcgi_param PATH_INFO $fastcgi_path_info;
        fastcgi_param HTTP_PROXY "";
        include fastcgi_params;
    }

    # Decoupled Router (needed for Next.js path resolution)
    location /router {
        try_files $uri /index.php?$query_string;
        fastcgi_pass php-fpm;
        fastcgi_param SCRIPT_FILENAME /var/www/html/web/index.php;
        include fastcgi_params;
    }

    # Subrequests (batched JSON:API)
    location /subrequests {
        try_files $uri /index.php?$query_string;
        fastcgi_pass php-fpm;
        fastcgi_param SCRIPT_FILENAME /var/www/html/web/index.php;
        include fastcgi_params;
    }

    # Canvas API proxy — so Next.js can fetch Canvas layouts
    location /canvas/api {
        fastcgi_pass php-fpm;
        fastcgi_param SCRIPT_FILENAME /var/www/html/web/index.php;
        fastcgi_param QUERY_STRING $query_string;
        fastcgi_param PATH_INFO $fastcgi_path_info;
        fastcgi_param HTTP_PROXY "";
        include fastcgi_params;
        fastcgi_read_timeout 300;
    }

    # Headless Custom Canvas API proxy
    location /api/canvas- {
        fastcgi_pass php-fpm;
        fastcgi_param SCRIPT_FILENAME /var/www/html/web/index.php;
        fastcgi_param QUERY_STRING $query_string;
        fastcgi_param PATH_INFO $fastcgi_path_info;
        fastcgi_param HTTP_PROXY "";
        include fastcgi_params;
    }

    # Headless Menu API proxy
    location /api/menu {
        fastcgi_pass php-fpm;
        fastcgi_param SCRIPT_FILENAME /var/www/html/web/index.php;
        fastcgi_param QUERY_STRING $query_string;
        fastcgi_param PATH_INFO $fastcgi_path_info;
        fastcgi_param HTTP_PROXY "";
        include fastcgi_params;
    }

    # Marketplace API — registration, packages, categories, profiles, stars
    location /api/register {
        fastcgi_pass php-fpm;
        fastcgi_param SCRIPT_FILENAME /var/www/html/web/index.php;
        fastcgi_param QUERY_STRING $query_string;
        fastcgi_param PATH_INFO $fastcgi_path_info;
        fastcgi_param HTTP_PROXY "";
        include fastcgi_params;
        client_max_body_size 10M;
    }

    location /api/forgot-password {
        fastcgi_pass php-fpm;
        fastcgi_param SCRIPT_FILENAME /var/www/html/web/index.php;
        fastcgi_param QUERY_STRING $query_string;
        fastcgi_param PATH_INFO $fastcgi_path_info;
        fastcgi_param HTTP_PROXY "";
        include fastcgi_params;
    }

    location /api/me {
        fastcgi_pass php-fpm;
        fastcgi_param SCRIPT_FILENAME /var/www/html/web/index.php;
        fastcgi_param QUERY_STRING $query_string;
        fastcgi_param PATH_INFO $fastcgi_path_info;
        fastcgi_param HTTP_PROXY "";
        include fastcgi_params;
    }

    location /api/profile {
        fastcgi_pass php-fpm;
        fastcgi_param SCRIPT_FILENAME /var/www/html/web/index.php;
        fastcgi_param QUERY_STRING $query_string;
        fastcgi_param PATH_INFO $fastcgi_path_info;
        fastcgi_param HTTP_PROXY "";
        include fastcgi_params;
    }

    location /api/marketplace {
        fastcgi_pass php-fpm;
        fastcgi_param SCRIPT_FILENAME /var/www/html/web/index.php;
        fastcgi_param QUERY_STRING $query_string;
        fastcgi_param PATH_INFO $fastcgi_path_info;
        fastcgi_param HTTP_PROXY "";
        include fastcgi_params;
        fastcgi_read_timeout 300;
        client_max_body_size 20M;
    }

    location /api/search-users {
        fastcgi_pass php-fpm;
        fastcgi_param SCRIPT_FILENAME /var/www/html/web/index.php;
        fastcgi_param QUERY_STRING $query_string;
        fastcgi_param PATH_INFO $fastcgi_path_info;
        fastcgi_param HTTP_PROXY "";
        include fastcgi_params;
    }

    # Drupal uploaded files (served from Drupal's sites/default/files)
    location /sites/default/files {
        root /var/www/html/web;
        try_files $uri =404;
        expires 30d;
        access_log off;
    }

    # Next.js static assets
    location /_next {
        proxy_pass http://nextjs;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }

    # Static assets served by Next.js (favicon, OG image, sitemap, robots)
    location ~ ^/(favicon\.ico|og-image\.png|sitemap\.xml|robots\.txt|monkeyslegion-logo\.svg|monkeyslegion-icon\.svg|monkey-404\.png)$ {
        proxy_pass http://nextjs;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        expires 7d;
        access_log off;
    }

    # Default: proxy everything else to Next.js
    location / {
        proxy_pass http://nextjs;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }
}
